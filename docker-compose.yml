services:
# PostgreSQL Database for Commodity Prices
  postgres:
    image: postgres:14
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: commodity_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./data:/commodity-tracker/data
      - type: bind
        source: ./scripts/init.sql
        target: /docker-entrypoint-initdb.d/01-init.sql
      - type: bind
        source: ./scripts/bronze/ddl_bronze.sql
        target: /docker-entrypoint-initdb.d/02-ddl-bronze.sql

    networks:
      - etl-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myuser -d commodity_db"]  
      interval: 10s
      timeout:  5s
      retries: 5  
 
  # Airflow Metadata Database
  postgres-airflow-metadata:
    image: postgres:14
    environment:
      POSTGRES_USER: airflow_user
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: airflow_metadata
    ports:
      - "5433:5432"
    volumes:
      - pgdata-airflow:/var/lib/postgresql/data
    networks:
      - etl-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow_user -d airflow_metadata"]  
      interval: 10s
      timeout:  5s
      retries: 5

  # Airflow Webserver and Scheduler
  airflow-manager:
    image: airflow-with-dependencies:latest ##This image must be locally built in the specified name before execution. Use `Dockerfile_airflow` to compile the image
    user: root
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql+psycopg://airflow_user:secret@postgres-airflow-metadata:5432/airflow_metadata
      AIRFLOW__DATABASE__LOAD_DEFAULT_CONNECTIONS: False
      AIRFLOW_CONN_POSTGRES_DEFAULT: postgresql://myuser:secret@postgres:5432/commodity_db
      HOST_PWD: $PWD
      SHARED_DATA_PATH: /airflow-data
    volumes:
      - ./dags:/opt/airflow/dags
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/opt/airflow/data
      - ./scripts:/opt/airflow/scripts

      # Mount data volume - THIS MUST BE AN ABSOLUTE PATH ON YOUR HOST
      # Replace /absolute/path/to with the actual location of your docker-compose.yml parent directory
      # For example: /home/user/my-project:/airflow-data or /root/project:/airflow-data
      - /var/lib/docker/volumes/commodity-data/_data:/airflow-data
    ports:
      - "8080:8080"
    depends_on: 
      postgres-airflow-metadata:
        condition: service_healthy
    command: ["standalone"] 
    networks:
      - etl-network

networks:
  etl-network:
    driver: bridge

volumes:
  pgdata:
  pgdata-airflow:
  commodity-data:
